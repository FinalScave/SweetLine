plugins {
    id 'java'
    id 'application'
}

java {
    sourceCompatibility = JavaVersion.VERSION_22
    targetCompatibility = JavaVersion.VERSION_22
}

repositories {
    mavenCentral()
}

dependencies {
    implementation project(':sweetline')
    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

application {
    mainClass = 'com.qiplat.sweetline.demo.Main'
    def osName = System.getProperty('os.name').toLowerCase()
    def osArch = System.getProperty('os.arch').toLowerCase()
    def nativeLibSubDir
    if (osName.contains('windows')) {
        nativeLibSubDir = '../../prebuilt/windows/x64'
    } else if (osName.contains('mac')) {
        if (osArch.contains('aarch64') || osArch.contains('arm64')) {
            nativeLibSubDir = '../../prebuilt/macos/arm64'
        } else {
            nativeLibSubDir = '../../prebuilt/macos/x86_64'
        }
    } else if (osName.contains('linux')) {
        if (osArch.contains('aarch64') || osArch.contains('arm64')) {
            nativeLibSubDir = '../../prebuilt/linux/aarch64'
        } else {
            nativeLibSubDir = '../../prebuilt/linux/x86_64'
        }
    } else {
        throw new GradleException("Unsupported OS for SweetLine demo nativeLibDir: ${System.getProperty('os.name')}")
    }
    def nativeLibDir = rootProject.projectDir.toPath().resolve(nativeLibSubDir).toAbsolutePath().normalize().toString()
    def expectedLibName
    if (osName.contains('windows')) {
        expectedLibName = 'sweetline.dll'
    } else if (osName.contains('mac')) {
        expectedLibName = 'libsweetline.dylib'
    } else {
        expectedLibName = 'libsweetline.so'
    }

    tasks.named('run') {
        doFirst {
            def expectedLib = new File(nativeLibDir, expectedLibName)
            if (!expectedLib.exists()) {
                throw new GradleException("Native library not found: ${expectedLib}. Build or sync the matching prebuilt SweetLine shared library first.")
            }
        }
    }

    applicationDefaultJvmArgs = [
            '--enable-native-access=ALL-UNNAMED',
            "-Djava.library.path=${nativeLibDir}",
            "-Dsweetline.lib.path=${nativeLibDir}"
    ]
}

run {
    def syntaxesDir = rootProject.projectDir.toPath().resolve('../../syntaxes').toAbsolutePath().normalize().toString()
    def examplesDir = rootProject.projectDir.toPath().resolve('../../tests/files').toAbsolutePath().normalize().toString()
    args = [syntaxesDir, examplesDir]
}

test {
    useJUnitPlatform()
    jvmArgs '--enable-native-access=ALL-UNNAMED'
}
