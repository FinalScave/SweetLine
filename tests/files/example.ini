; SweetLine INI sample.
# The file uses common INI constructs: sections, comments, keys, values,
# booleans, numbers, quoted strings, URLs, and repeated environment blocks.

[application]
name = SweetLine
version = 1.2.2
enabled = true
start_minimized = false
theme = dark
max_recent_files = 12
main_window_width = 1280
main_window_height = 800
welcome_url = https://example.com/sweetline
backup_dir = C:\Users\demo\AppData\Local\SweetLine\backup
profile_dir = "/home/demo/.config/sweetline"
notes = "Example configuration for the syntax highlighter"
author = SweetLine Project
license = MIT
build_id = 20260419

[paths]
config = /etc/sweetline/config.ini
data = /var/lib/sweetline
cache = /var/cache/sweetline
plugins = /usr/share/sweetline/plugins
assets = /usr/share/sweetline/assets
temp = /tmp/sweetline
logs = /var/log/sweetline
documents = /home/demo/Documents/SweetLine
reports = /home/demo/Documents/SweetLine/reports
export = "/home/demo/Exports/SweetLine"
template = "${HOME}/.config/sweetline/template"

[logging]
level = info
format = "%Y-%m-%d %H:%M:%S [%l] %m"
rotate = daily
file = /var/log/sweetline/app.log
console = yes
color = true
keep_files = 7
max_size_mb = 16
trace_http = false
stderr = off

[server]
host = 127.0.0.1
port = 8080
tls = on
cert_file = /etc/sweetline/cert.pem
key_file = /etc/sweetline/key.pem
allowed_origin = https://localhost:3000
request_timeout = 30
body_limit = 1048576
worker_threads = 4
public_url = https://api.example.com
health_path = /healthz

[database]
engine = sqlite
dsn = "file:/var/lib/sweetline/state.db"
pool_size = 8
timeout = 15
retry_count = 3
readonly = false
migrations = true
vacuum_on_start = true
journal_mode = wal
schema_version = 42

[cache]
enabled = true
backend = memory
ttl_seconds = 600
max_items = 4096
directory = /var/cache/sweetline
evict_policy = lru
compress = on
warmup = false
namespace = sweetline-demo
cleanup_interval = 60

[features]
experimental_mode = false
enable_preview = yes
use_jit = on
allow_unsafe_plugins = no
metrics = true
remote_sync = false
persist_state = true
auto_save = true
auto_reload = false
feature_flag_alpha = true
feature_flag_beta = false
feature_flag_gamma = yes

[renderer]
backend = skia
scale = 1.5
antialias = true
v_sync = on
frame_budget = 16
window_mode = maximized
accent_color = "#4f6bed"
show_status_bar = true
show_side_bar = left
font_family = "JetBrains Mono"

[security]
sandbox = strict
allow_scripts = false
trusted_hosts = localhost,127.0.0.1
certificate_authority = /etc/ssl/certs/ca.pem
https_only = true
secret_storage = keyring
mask_tokens = true
remember_sessions = false
lock_timeout = 900

[profiles.dev]
debug = true
verbose = true
mock_api = on
api_url = http://127.0.0.1:9090
token = "dev-token"
time_zone = UTC
refresh_interval = 5
cache = false
log_level = debug
feature_flag_alpha = true

[profiles.prod]
debug = false
verbose = false
mock_api = off
api_url = https://api.example.com
token = "redacted"
time_zone = Asia/Shanghai
refresh_interval = 60
cache = true
log_level = warn
feature_flag_alpha = false

[telemetry]
enabled = false
endpoint = https://telemetry.example.com/ingest
sample_rate = 0.25
batch_size = 32
send_errors = true
send_crash_reports = false
api_key = "00000000-0000-0000-0000-000000000000"
tags = stable,local,internal
upload_interval = 15
flush_on_exit = true

[editor]
indent_style = space
indent_size = 2
tab_width = 2
trim_trailing_whitespace = true
insert_final_newline = true
show_line_numbers = true
wrap = off
column = 100
theme = "Solarized Dark"
font_size = 14

[sync]
enabled = true
server = https://sync.example.com
interval = 15
conflict_policy = remote_wins
last_sync = 2026-04-19T10:30:00Z
retry_delay = 30
chunk_size = 8192
compress = true
mirror_local = false
mirror_remote = true
