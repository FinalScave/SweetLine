<?xml version="1.0" encoding="UTF-8"?>
<!-- SVG sample file -->
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" 
     xmlns:xlink="http://www.w3.org/1999/xlink"
     width="800" 
     height="600" 
     viewBox="0 0 800 600"
     version="1.1">
  
  <!-- Definitions -->
  <defs>
    <!-- Gradient -->
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00FF00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0000FF;stop-opacity:1" />
    </linearGradient>
    
    <!-- Radial gradient -->
    <radialGradient id="gradient2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </radialGradient>
    
    <!-- Pattern -->
    <pattern id="pattern1" patternUnits="userSpaceOnUse" width="10" height="10">
      <circle cx="5" cy="5" r="2" fill="#000000" />
    </pattern>
    
    <!-- Clip path -->
    <clipPath id="clip1">
      <rect x="100" y="100" width="200" height="200" />
    </clipPath>
    
    <!-- Filter -->
    <filter id="filter1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" />
    </filter>
    
    <!-- Symbol -->
    <symbol id="star" viewBox="0 0 100 100">
      <polygon points="50,5 61,40 98,40 68,62 79,97 50,75 21,97 32,62 2,40 39,40" fill="#FFD700" />
    </symbol>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" fill="#F0F0F0" />
  
  <!-- Basic shapes -->
  <rect x="50" y="50" width="100" height="80" fill="#FF0000" stroke="#000000" stroke-width="2" />
  
  <circle cx="250" cy="90" r="40" fill="url(#gradient1)" stroke="#000000" stroke-width="2" />
  
  <ellipse cx="400" cy="90" rx="60" ry="40" fill="#00FF00" stroke="#000000" stroke-width="2" />
  
  <line x1="500" y1="50" x2="700" y2="130" stroke="#0000FF" stroke-width="3" />
  
  <polyline points="50,200 100,150 150,200 200,150 250,200" fill="none" stroke="#FF00FF" stroke-width="2" />
  
  <polygon points="350,150 400,200 450,150 400,100" fill="#FFFF00" stroke="#000000" stroke-width="2" />
  
  <!-- Path -->
  <path d="M 50 300 Q 150 250 250 300 T 450 300" fill="none" stroke="#00FFFF" stroke-width="3" />
  
  <path d="M 500 250 L 550 300 L 600 250 L 650 300 L 700 250" fill="none" stroke="#FFA500" stroke-width="2" />
  
  <!-- Text -->
  <text x="100" y="350" font-family="Arial" font-size="24" fill="#000000">
    Sample SVG Text
  </text>
  
  <text x="100" y="400" font-family="Arial" font-size="18" fill="#333333">
    <tspan x="100" y="400">Line 1</tspan>
    <tspan x="100" y="420">Line 2</tspan>
    <tspan x="100" y="440">Line 3</tspan>
  </text>
  
  <!-- Group with transformations -->
  <g transform="translate(400, 400) rotate(45)">
    <rect x="-50" y="-50" width="100" height="100" fill="#800080" stroke="#000000" stroke-width="2" />
    <circle cx="0" cy="0" r="30" fill="#FFC0CB" stroke="#000000" stroke-width="1" />
  </g>
  
  <!-- Use symbol -->
  <use xlink:href="#star" x="600" y="400" width="50" height="50" />
  
  <!-- Image -->
  <image xlink:href="example.png" x="50" y="450" width="100" height="100" />
  
  <!-- Link -->
  <a xlink:href="https://example.com" target="_blank">
    <rect x="200" y="450" width="150" height="50" fill="#ADD8E6" stroke="#000000" stroke-width="2" />
    <text x="225" y="480" font-family="Arial" font-size="16" fill="#000000">Click Here</text>
  </a>
  
  <!-- Animated elements -->
  <circle cx="400" cy="500" r="20" fill="#FF6347">
    <animate attributeName="r" from="20" to="40" dur="2s" repeatCount="indefinite" />
    <animate attributeName="fill" values="#FF6347;#FFD700;#FF6347" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- CSS styles -->
  <style type="text/css">
    .styled-rect {
      fill: #4CAF50;
      stroke: #2E7D32;
      stroke-width: 2;
    }
    .styled-circle {
      fill: #2196F3;
      stroke: #1565C0;
      stroke-width: 1;
    }
    .styled-text {
      font-family: 'Helvetica', sans-serif;
      font-size: 20px;
      fill: #333333;
    }
  </style>
  
  <!-- Styled elements -->
  <rect class="styled-rect" x="500" y="450" width="120" height="80" rx="10" ry="10" />
  <circle class="styled-circle" cx="700" cy="490" r="40" />
  <text class="styled-text" x="520" y="500">Styled Text</text>
  
  <!-- Complex path with curves -->
  <path d="M 50 550 
           C 100 500, 150 600, 200 550 
           S 300 500, 350 550 
           Q 400 500, 450 550 
           T 550 550" 
        fill="none" 
        stroke="#9C27B0" 
        stroke-width="3" />
  
  <!-- Mask -->
  <mask id="mask1">
    <rect x="0" y="0" width="800" height="600" fill="white" />
    <circle cx="650" cy="100" r="50" fill="black" />
  </mask>
  
  <rect x="600" y="50" width="100" height="100" fill="#FF9800" mask="url(#mask1)" />
  
  <!-- Foreign object -->
  <foreignObject x="50" y="500" width="200" height="80">
    <div xmlns="http://www.w3.org/1999/xhtml" style="font-size: 14px; color: #333;">
      <p>This is HTML content inside SVG.</p>
      <p style="color: red;">Styled HTML text.</p>
    </div>
  </foreignObject>
  
  <!-- CDATA section -->
  <script type="application/ecmascript">
    <![CDATA[
      function changeColor() {
        var circle = document.getElementById("animatedCircle");
        circle.setAttribute("fill", "#00FF00");
      }
    ]]>
  </script>
  
  <!-- Entity references -->
  <text x="300" y="580" font-family="Arial" font-size="14">
    &lt;SVG&gt; supports &amp; entities like &quot;quotes&quot; and &apos;apostrophes&apos;
  </text>
  
  <!-- Nested SVG -->
  <svg x="600" y="200" width="150" height="150" viewBox="0 0 100 100">
    <rect width="100" height="100" fill="#E0E0E0" />
    <circle cx="50" cy="50" r="40" fill="#607D8B" />
  </svg>
  
</svg>
